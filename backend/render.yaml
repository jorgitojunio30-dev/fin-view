services:
  - type: web
    name: fin-view-fastapi
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALLOWED_ORIGINS
        sync: false  # Defina manualmente no painel do Render com a URL do seu frontend
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false  # Cole o conteúdo do firebase-credentials.json aqui
